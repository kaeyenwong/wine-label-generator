<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Label Copy Generator | AI Tool by Kae Yen Wong</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --wine-deep: #3d1a1a;
            --wine-burgundy: #6b2737;
            --wine-rose: #9d5c63;
            --cream: #f4ede4;
            --parchment: #ebe3d5;
            --gold: #c9a961;
            --charcoal: #2b2b2b;
            --text-primary: #2b2b2b;
            --text-secondary: #5a5a5a;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #f4ede4 0%, #ebe3d5 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 1px solid var(--wine-rose);
            padding-bottom: 40px;
        }

        h1 {
            font-family: 'Cormorant', serif;
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--wine-deep);
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .input-section {
            background: white;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 4px 24px rgba(61, 26, 26, 0.08);
        }

        .section-title {
            font-family: 'Cormorant', serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--wine-burgundy);
            margin-bottom: 24px;
            letter-spacing: 0.01em;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.8rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d4c5b9;
            background: var(--cream);
            border-radius: 2px;
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--wine-rose);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        .demo-button {
            background: transparent;
            border: 1px solid var(--wine-burgundy);
            color: var(--wine-burgundy);
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .demo-button:hover {
            background: var(--wine-burgundy);
            color: white;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--parchment);
            border: 1px solid #d4c5b9;
            border-radius: 2px;
            margin-bottom: 24px;
        }

        .captcha-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--wine-burgundy);
        }

        .captcha-label {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
        }

        .generate-button {
            width: 100%;
            padding: 16px;
            background: var(--wine-burgundy);
            color: white;
            border: none;
            border-radius: 2px;
            font-family: 'Cormorant', serif;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        .generate-button:hover:not(:disabled) {
            background: var(--wine-deep);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(61, 26, 26, 0.2);
        }

        .generate-button:disabled {
            background: #c4b5a5;
            cursor: not-allowed;
        }

        .output-section {
            position: sticky;
            top: 24px;
        }

        .output-card {
            background: white;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 4px 24px rgba(61, 26, 26, 0.08);
            margin-bottom: 24px;
            border-left: 3px solid var(--wine-rose);
            position: relative;
        }

        .output-card.loading {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--parchment);
            border-top-color: var(--wine-burgundy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .style-label {
            font-family: 'Cormorant', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--wine-burgundy);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
        }

        .copy-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-family: 'Lato', sans-serif;
        }

        .copy-button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .copy-button:hover {
            background: var(--gold);
            color: white;
        }

        .copy-button.copied {
            background: var(--gold);
            color: white;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #dc2626;
            color: #991b1b;
            padding: 16px;
            border-radius: 2px;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .placeholder {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-secondary);
        }

        .placeholder-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .placeholder-text {
            font-family: 'Cormorant', serif;
            font-size: 1.3rem;
            font-weight: 300;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--wine-rose);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--wine-burgundy);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--wine-deep);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Rate limiting utilities
        const RATE_LIMIT = {
            TOTAL_PER_DAY: 25,
            PER_IP_PER_DAY: 3
        };

        const getRateLimitData = () => {
            const data = localStorage.getItem('wineLabelRateLimit');
            if (!data) return { total: 0, byIP: {}, date: new Date().toDateString() };
            
            const parsed = JSON.parse(data);
            // Reset if it's a new day
            if (parsed.date !== new Date().toDateString()) {
                return { total: 0, byIP: {}, date: new Date().toDateString() };
            }
            return parsed;
        };

        const updateRateLimitData = (ip) => {
            const data = getRateLimitData();
            data.total += 1;
            data.byIP[ip] = (data.byIP[ip] || 0) + 1;
            localStorage.setItem('wineLabelRateLimit', JSON.stringify(data));
            return data;
        };

        const checkRateLimit = (ip) => {
            const data = getRateLimitData();
            if (data.total >= RATE_LIMIT.TOTAL_PER_DAY) {
                return { allowed: false, reason: 'Daily limit reached. Please try again tomorrow.' };
            }
            if (data.byIP[ip] >= RATE_LIMIT.PER_IP_PER_DAY) {
                return { allowed: false, reason: 'You\'ve reached your daily limit. Please try again tomorrow.' };
            }
            return { allowed: true };
        };

        // Simple IP fingerprinting (not perfect, but sufficient for portfolio demo)
        const getIPFingerprint = () => {
            const nav = navigator;
            const screen = window.screen;
            const fingerprint = `${nav.userAgent}-${nav.language}-${screen.width}x${screen.height}`;
            return btoa(fingerprint).substring(0, 16);
        };

        function WineLabelGenerator() {
            const [formData, setFormData] = useState({
                wineryName: '',
                location: '',
                varietal: '',
                appearance: '',
                nose: '',
                palate: '',
                finish: '',
                personality: 'poetic',
                vineyardDetails: '',
                winemaker: ''
            });

            const [captchaChecked, setCaptchaChecked] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [outputs, setOutputs] = useState([]);
            const [copiedIndex, setCopiedIndex] = useState(null);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const loadSebastopolDemo = () => {
                setFormData({
                    wineryName: 'West Ridge Vineyard',
                    location: 'Sebastopol, West Sonoma Coast',
                    varietal: 'Gamay Noir',
                    appearance: 'Bright ruby with violet edges, medium body',
                    nose: 'Red cherry, wild strawberry, hints of forest floor and white pepper',
                    palate: 'Juicy red fruit, subtle earthiness, bright acidity, silky tannins',
                    finish: 'Clean and refreshing with lingering berry notes',
                    personality: 'poetic',
                    vineyardDetails: 'Estate-grown on Gold Ridge sandy loam, dry-farmed on 3309C rootstock',
                    winemaker: 'Small-batch production focused on expressing terroir and vintage character'
                });
            };

            const handleGenerate = async () => {
                // Validation
                if (!formData.wineryName || !formData.varietal || !formData.nose) {
                    setError('Please fill in at least winery name, varietal, and tasting notes.');
                    return;
                }

                if (!captchaChecked) {
                    setError('Please verify you\'re not a robot.');
                    return;
                }

                // Rate limiting
                const ipFingerprint = getIPFingerprint();
                const rateLimitCheck = checkRateLimit(ipFingerprint);
                
                if (!rateLimitCheck.allowed) {
                    setError(rateLimitCheck.reason);
                    return;
                }

                setError('');
                setLoading(true);
                setOutputs([]);

                try {
                    const personalityDescriptions = {
                        poetic: 'poetic and story-driven, evocative language that transports the reader',
                        technical: 'technical and sommelier-focused, precise tasting notes and winemaking details',
                        approachable: 'approachable and conversational, warm and inviting tone',
                        luxury: 'luxury and elegant, sophisticated language emphasizing prestige and craft'
                    };

                    const prompt = `You are an expert wine copywriter. Generate 3-4 distinct back-label copy variations for a wine with these details:

Winery: ${formData.wineryName}
Location: ${formData.location}
Varietal: ${formData.varietal}
Appearance: ${formData.appearance}
Nose: ${formData.nose}
Palate: ${formData.palate}
Finish: ${formData.finish}
${formData.vineyardDetails ? `Vineyard: ${formData.vineyardDetails}` : ''}
${formData.winemaker ? `Winemaker Philosophy: ${formData.winemaker}` : ''}

Brand Personality: ${personalityDescriptions[formData.personality]}

Requirements:
- Each variation should be 50-100 words (actual back-label length)
- Show range: one might lead with place/terroir, another with winemaking, another with sensory experience
- Use evocative, precise language appropriate for wine labels
- Avoid clichés like "notes of" repetitively - vary your descriptive approach
- Each should feel distinctly different in tone and focus

Return ONLY a JSON array with this structure:
[
  {
    "style": "Terroir-Focused",
    "copy": "the label copy here"
  },
  {
    "style": "Winemaker's Story",
    "copy": "the label copy here"
  },
  {
    "style": "Sensory Journey",
    "copy": "the label copy here"
  }
]

Return ONLY the JSON array, no markdown, no preamble, no backticks.`;

                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'anthropic-version': '2023-06-01',
                            'x-api-key': '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' // This will be replaced with environment variable in Vercel
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 2000,
                            messages: [
                                { role: 'user', content: prompt }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error('API request failed');
                    }

                    const data = await response.json();
                    const responseText = data.content[0].text;
                    
                    // Parse JSON response
                    const variations = JSON.parse(responseText);
                    setOutputs(variations);
                    
                    // Update rate limit
                    updateRateLimitData(ipFingerprint);

                } catch (err) {
                    console.error('Generation error:', err);
                    setError('Failed to generate copy. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = async (text, index) => {
                try {
                    await navigator.clipboard.writeText(text);
                    setCopiedIndex(index);
                    setTimeout(() => setCopiedIndex(null), 2000);
                } catch (err) {
                    console.error('Copy failed:', err);
                }
            };

            return (
                <div className="container">
                    <header>
                        <h1>Wine Label Copy Generator</h1>
                        <p className="subtitle">AI-Powered Back-Label Copywriting Tool</p>
                    </header>

                    <div className="main-grid">
                        <div className="input-section">
                            <h2 className="section-title">Wine Details</h2>
                            
                            <div className="form-group">
                                <label>Winery Name *</label>
                                <input 
                                    type="text" 
                                    name="wineryName"
                                    value={formData.wineryName}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Domaine Laurent"
                                />
                            </div>

                            <div className="form-group">
                                <label>Location</label>
                                <input 
                                    type="text" 
                                    name="location"
                                    value={formData.location}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Russian River Valley, Sonoma Coast"
                                />
                            </div>

                            <div className="form-group">
                                <label>Varietal(s) *</label>
                                <input 
                                    type="text" 
                                    name="varietal"
                                    value={formData.varietal}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Pinot Noir, Chardonnay Blend"
                                />
                            </div>

                            <div className="form-group">
                                <label>Brand Personality</label>
                                <select 
                                    name="personality"
                                    value={formData.personality}
                                    onChange={handleInputChange}
                                >
                                    <option value="poetic">Poetic & Story-Driven</option>
                                    <option value="technical">Technical & Sommelier-Focused</option>
                                    <option value="approachable">Approachable & Conversational</option>
                                    <option value="luxury">Luxury & Elegant</option>
                                </select>
                            </div>

                            <h2 className="section-title" style={{marginTop: '32px'}}>Tasting Notes</h2>

                            <div className="form-group">
                                <label>Appearance</label>
                                <input 
                                    type="text" 
                                    name="appearance"
                                    value={formData.appearance}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Deep ruby with garnet rim"
                                />
                            </div>

                            <div className="form-group">
                                <label>Nose *</label>
                                <textarea 
                                    name="nose"
                                    value={formData.nose}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Black cherry, tobacco, cedar, hints of vanilla..."
                                />
                            </div>

                            <div className="form-group">
                                <label>Palate</label>
                                <textarea 
                                    name="palate"
                                    value={formData.palate}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Rich and structured, balanced acidity..."
                                />
                            </div>

                            <div className="form-group">
                                <label>Finish</label>
                                <input 
                                    type="text" 
                                    name="finish"
                                    value={formData.finish}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Long, elegant finish with subtle spice"
                                />
                            </div>

                            <h2 className="section-title" style={{marginTop: '32px'}}>Optional Details</h2>

                            <div className="form-group">
                                <label>Vineyard Details</label>
                                <textarea 
                                    name="vineyardDetails"
                                    value={formData.vineyardDetails}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Estate-grown, elevation, soil type, farming practices..."
                                />
                            </div>

                            <div className="form-group">
                                <label>Winemaker Philosophy</label>
                                <textarea 
                                    name="winemaker"
                                    value={formData.winemaker}
                                    onChange={handleInputChange}
                                    placeholder="e.g., Minimal intervention, old-world techniques..."
                                />
                            </div>

                            <button onClick={loadSebastopolDemo} className="demo-button">
                                Load Sebastopol Demo
                            </button>

                            <div style={{marginTop: '32px'}}>
                                <div className="captcha-container">
                                    <input 
                                        type="checkbox" 
                                        className="captcha-checkbox"
                                        checked={captchaChecked}
                                        onChange={(e) => setCaptchaChecked(e.target.checked)}
                                    />
                                    <label className="captcha-label">I'm not a robot</label>
                                </div>

                                {error && <div className="error-message">{error}</div>}

                                <button 
                                    onClick={handleGenerate}
                                    disabled={loading}
                                    className="generate-button"
                                >
                                    {loading ? 'Crafting Copy...' : 'Generate Label Copy'}
                                </button>
                            </div>
                        </div>

                        <div className="output-section">
                            {outputs.length === 0 && !loading && (
                                <div className="output-card">
                                    <div className="placeholder">
                                        <div className="placeholder-icon">🍷</div>
                                        <p className="placeholder-text">
                                            Your generated copy will appear here
                                        </p>
                                    </div>
                                </div>
                            )}

                            {loading && (
                                <div className="output-card loading">
                                    <div className="loader"></div>
                                </div>
                            )}

                            {outputs.map((output, index) => (
                                <div key={index} className="output-card">
                                    <div className="style-label">{output.style}</div>
                                    <div className="copy-text">{output.copy}</div>
                                    <button 
                                        onClick={() => copyToClipboard(output.copy, index)}
                                        className={`copy-button ${copiedIndex === index ? 'copied' : ''}`}
                                    >
                                        {copiedIndex === index ? 'Copied!' : 'Copy to Clipboard'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <footer>
                        <p>Built by <a href="https://kaeyenwong.com" target="_blank">Kae Yen Wong</a> • 
                        Demonstrating AI as a creative multiplier for wine producers</p>
                        <p style={{marginTop: '8px', fontSize: '0.85rem', opacity: '0.7'}}>
                            Rate limited to 25 generations/day, 3 per user • For portfolio demonstration purposes
                        </p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<WineLabelGenerator />, document.getElementById('root'));
    </script>
</body>
</html>
